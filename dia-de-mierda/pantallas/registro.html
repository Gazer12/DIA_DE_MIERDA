        /* Retro Pixel Art Styles */
        .pixel-border {
            box-shadow: 
                0 -4px 0 0 #000,

                4px 0 0 0 #000;
        }

        .pixel-button-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 1);
        }

        .pixel-button-shadow:active {
            box-shadow: 0px 0px 0px 0px rgba(0, 0, 0, 1);

        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            100% { opacity: 1; }
        }

        .blinking-cursor {
            width: 10px;
            height: 20px;
            background: #4cd7f6;
            display: inline-block;
            animation: blink 0.8s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Material Symbols weight setup */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<script>
        // Simple pixel interactivity: Add a slight "glitch" effect on button hover
        const btn = document.querySelector('button[type="submit"]');
        if(btn) {
            btn.addEventListener('mouseover', () => {
                const colors = ['#4cd7f6', '#ffb0cd', '#ddb7ff'];
                let i = 0;
                const interval = setInterval(() => {
                    btn.style.borderColor = colors[i % colors.length];
                    i++;
                    if (i > 6) {
                        clearInterval(interval);
                        btn.style.borderColor = '';
                    }
                }, 50);
            });
        }
    </script>
