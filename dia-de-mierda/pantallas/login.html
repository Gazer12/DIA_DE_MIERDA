<!DOCTYPE html><html class="dark" lang="es" style=""><head>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&amp;family=Geist:wght@100..900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom Scanline Effect */
        .scanlines {
            position: relative;
            overflow: hidden;
        }
        .scanlines::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* Flicker Animation */
        @keyframes flicker {
            0% { opacity: 0.97; }
            5% { opacity: 0.95; }
            10% { opacity: 0.9; }
            15% { opacity: 0.98; }
            20% { opacity: 0.92; }
            100% { opacity: 1; }
        }
        .flicker-text {
            animation: flicker 0.15s infinite;
        }

        /* Pixel-ish Border utilities */
        .pixel-border {
            box-shadow: 
                0 -4px 0 0 #000,
                0 4px 0 0 #000,
                -4px 0 0 0 #000,
                4px 0 0 0 #000;
        }
        .pixel-border-sm {
            box-shadow: 
                0 -2px 0 0 #000,
                0 2px 0 0 #000,
                -2px 0 0 0 #000,
                2px 0 0 0 #000;
        }

        .arcade-btn-shadow {
            box-shadow: 0 6px 0 0 rgba(0, 0, 0, 1);
        }
        .arcade-btn-shadow:active {
            box-shadow: 0 0px 0 0 rgba(0, 0, 0, 1);
            transform: translateY(6px);
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {

                "on-secondary-container": "#00424e",
                "surface-container": "#231e27",
                "tertiary": "#ffb0cd",
                "on-surface-variant": "#cfc2d6",
                "surface": "#16111b",

                "on-secondary-fixed-variant": "#004e5c",
                "surface-bright": "#3d3741",

                "error": "#ffb4ab",

                "on-primary-fixed-variant": "#6900b3",
                "inverse-surface": "#eadfed",
                "on-background": "#eadfed",
                "error-container": "#93000a",
                "on-primary": "#490080",

                "primary-fixed-dim": "#ddb7ff",
                "secondary-container": "#03b5d3",
                "on-surface": "#eadfed",
                "on-secondary-fixed": "#001f26",
                "on-error": "#690005",
                "outline-variant": "#4d4354",
                "primary": "#ddb7ff",
                "surface-container-highest": "#39323d",
                "tertiary-fixed-dim": "#ffb0cd",
                "on-error-container": "#ffdad6",
                "secondary-fixed-dim": "#4cd7f6",
                "tertiary-fixed": "#ffd9e4",
                "surface-tint": "#ddb7ff",
                "primary-container": "#b76dff",
                "surface-variant": "#39323d",
                "on-tertiary": "#640039",
                "tertiary-container": "#f751a1",
                "primary-fixed": "#f0dbff",
                "on-primary-fixed": "#2c0051",
                "surface-container-lowest": "#110c15",
                "surface-container-high": "#2e2832",
                "surface-dim": "#16111b",
                "on-primary-container": "#400071",
                "surface-container-low": "#1f1a23",
                "secondary-fixed": "#acedff"
            },
            "borderRadius": {
                "DEFAULT": "0px",
                "lg": "0px",
                "xl": "0px",
                "full": "9999px"
            },
            "spacing": {
                "gutter": "16px",
                "unit": "4px",
                "container-max": "1200px",
                "margin-mobile": "16px",
                "margin-desktop": "32px"
            },
            "fontFamily": {
                "body-lg": ["Geist"],
                "headline-lg-mobile": ["Space Mono"],
                "label-lg": ["Space Mono"],
                "headline-lg": ["Space Mono"],
                "headline-xl": ["Space Mono"],
                "headline-md": ["Space Mono"],
                "body-md": ["Geist"],
                "label-md": ["Space Mono"]
            },
            "fontSize": {
                "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],

      }
    </script>
</head>
<body class="bg-background text-on-background font-body-md selection:bg-tertiary selection:text-on-tertiary min-h-screen flex items-center justify-center p-4 scanlines">
<!-- Atmospheric WebGL Shader Background -->

<div class="relative z-10 w-full max-w-md">
<!-- Main Login Card -->
<main class="bg-surface-container border-4 border-on-background shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-8 md:p-12">
<!-- Header Section -->
<header class="text-center mb-10">
<h1 class="font-headline-xl text-headline-xl text-tertiary uppercase tracking-tighter mb-2 flicker-text">
                    DÍA DE MIERDA
                </h1>
<p class="font-label-lg text-label-lg text-secondary uppercase tracking-widest">
                    LOGUEATE PARA comenzar</p>
</header>
<!-- Form Section -->
<form class="space-y-8" onsubmit="event.preventDefault();">
<div class="space-y-6">
<!-- Email Field -->
<div class="group">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase mb-2" for="email">gmail por favor</label>
<div class="relative">
<input class="w-full bg-black text-secondary border-2 border-outline-variant focus:border-secondary focus:ring-0 px-4 py-3 font-label-lg transition-all pixel-border-sm" id="email" placeholder="PLAYER@EXAMPLE.COM" type="email">
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline-variant group-focus-within:text-secondary">
                                alternate_email
                            </span>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase mb-2" for="password">contraseña no te olvides&nbsp;</label>
<div class="relative">
<input class="w-full bg-black text-secondary border-2 border-outline-variant focus:border-secondary focus:ring-0 px-4 py-3 font-label-lg transition-all pixel-border-sm" id="password" placeholder="********" type="password">
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline-variant group-focus-within:text-secondary">
                                lock
                            </span>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-[#facc15] hover:bg-[#eab308] text-black font-headline-md text-headline-md uppercase py-4 transition-all arcade-btn-shadow border-4 border-black active:translate-y-1" type="submit">
                    ENTRAR
                </button>
</form>
<!-- Navigation Links -->
<footer class="mt-10 text-center space-y-4">
<a class="block font-label-md text-label-md text-secondary hover:text-tertiary transition-colors uppercase group" href="#">
<span class="inline-block group-hover:translate-x-1 transition-transform mr-1">►</span>
                    ¿No tienes cuenta? <span class="underline decoration-2 underline-offset-4">REGÍSTRATE AQUÍ</span>
</a>
<div class="pt-6 border-t-2 border-dashed border-outline-variant">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-on-surface transition-colors uppercase" href="#">
                        FORGOT_PASSWORD?
                    </a>
</div>
</footer>
</main>
<!-- Decorative Elements -->
<div class="absolute -top-4 -left-4 w-12 h-12 border-t-4 border-l-4 border-tertiary pointer-events-none"></div>
<div class="absolute -bottom-4 -right-4 w-12 h-12 border-b-4 border-r-4 border-tertiary pointer-events-none"></div>
<div class="flex justify-between mt-6 px-2">
<div class="flex gap-2">
<div class="w-3 h-3 bg-error shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"></div>
<div class="w-3 h-3 bg-secondary shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"></div>
<div class="w-3 h-3 bg-tertiary shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"></div>
</div>
<p class="font-label-md text-label-md text-on-surface-variant opacity-50 uppercase">
                v1.0.16-beta
            </p>
</div>
</div>
<!-- Background Decoration Grid -->
<div class="fixed inset-0 grid grid-cols-12 grid-rows-12 gap-0 opacity-5 pointer-events-none">
<div class="border-r border-b border-on-background"></div><div class="border-r border-b border-on-background"></div><div class="border-r border-b border-on-background"></div><div class="border-r border-b border-on-background"></div><div class="border-r border-b border-on-background"></div><div class="border-r border-b border-on-background"></div><div class="border-r border-b border-on-background"></div><div class="border-r border-b border-on-background"></div><div class="border-r border-b border-on-background"></div><div class="border-r border-b border-on-background"></div><div class="border-r border-b border-on-background"></div><div class="border-b border-on-background"></div>
<!-- (Simplified for brevity, visual grid is represented) -->
</div>
<script>
        // Simple micro-interaction for the arcade feeling
        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('mousedown', () => {
                const audio = new Audio('https://www.soundjay.com/buttons/button-3.mp3');
                audio.volume = 0.1;
                audio.play().catch(e => {}); // Ignore if interaction happens before user gesture
            });
        });

        // Blinking cursor effect for inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('flicker-text');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('flicker-text');
            });
        });
    </script>
</body></html>
